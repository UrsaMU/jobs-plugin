name: Publish to JSR

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for JSR OIDC auth

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Cache dependencies
        # Mirror CI: pre-fetch JSR deps including the softcode worker, which
        # is loaded dynamically (not seen by `deno cache mod.ts`) and has a
        # 150 ms boot budget that can't absorb a cold-cache JSR download.
        run: |
          deno cache mod.ts tests/*.ts
          deno cache https://jsr.io/@ursamu/ursamu/2.3.0/src/services/Softcode/softcode-worker.ts

      - name: Type check
        run: deno check mod.ts

      - name: Lint
        run: deno lint

      - name: Test
        run: deno task test

      - name: Publish to JSR
        run: deno publish

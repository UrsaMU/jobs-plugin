name: Publish to JSR

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for JSR OIDC auth

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Type check
        run: deno check mod.ts

      - name: Lint
        run: deno lint

      - name: Test
        run: deno task test

      - name: Publish to JSR
        run: deno publish
